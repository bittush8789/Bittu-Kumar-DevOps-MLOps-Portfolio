apiVersion: apps/v1
kind: Deployment
metadata:
  name: bittu-portfolio
  namespace: default
  labels:
    app: bittu-portfolio
    version: "1.0"
    managed-by: argocd
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bittu-portfolio
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0          # Zero-downtime deployment
  template:
    metadata:
      labels:
        app: bittu-portfolio
    spec:
      containers:
      - name: portfolio
        # ArgoCD / CI will update this tag automatically
        image: <AWS_ACCOUNT_ID>.dkr.ecr.ap-south-1.amazonaws.com/bittu-portfolio:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
          name: http
        # Resource limits — prevent OOM
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"
        # Health checks
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 10
          failureThreshold: 3
      # Spread pods across nodes for HA
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - bittu-portfolio
              topologyKey: kubernetes.io/hostname
